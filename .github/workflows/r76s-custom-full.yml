name: Build NanoPi R76S Custom Full

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/r76s-custom-full.yml']

jobs:
  build:
    name: NanoPi R76S OpenWrt 25.12.2 Custom
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Free disk space
      uses: sbwml/actions@free-disk
      with:
        build-mount-path: /builder
    
    - name: Build System Setup
      uses: sbwml/actions@openwrt-build-setup
    
    - name: Install LLVM
      uses: sbwml/actions@install-llvm
    
    - name: Clone OpenWrt Source
      working-directory: /builder
      run: |
        git clone --depth 1 --branch openwrt-25.12 https://github.com/sbwml/openwrt.git
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: Apply Custom Partition Config
      working-directory: /builder/openwrt
      run: |
        # 自定义分区配置（64GB eMMC）
        # boot: 64MB, kernel: 64MB, rootfs: 2GB, overlay: 8GB, docker: ~52GB
        cat >> target/linux/rockchip/image/armv8.mk << 'EOF'

        define Device/friendlyarm_nanopi-r76s-custom
        DEVICE_VENDOR := FriendlyElec
        DEVICE_MODEL := NanoPi R76S (Custom 64GB)
        DEVICE_DTS := rockchip/rk3576-nanopi-r76s
        DEVICE_PACKAGES := kmod-usb3 kmod-mmc kmod-sdio-host kmod-brcmfmac \\
        firmware-brcmfmac kmod-bluetooth bluez-libs bluez-tools \\
        dockerd docker-compose kmod-br-netfilter kmod-overlay kmod-veth \\
        kmod-fs-ext4 kmod-fs-vfat kmod-fs-ntfs3 kmod-usb-storage
        IMAGE/sysupgrade.img.gz := boot-script | boot-img | kernel-img | \\
        rootfs-img | gzip
        KERNEL_SIZE := 67108864
        BOOT_IMG_SIZE := 67108864
        ROOTFS_PARTSIZE := 2147483648
        endef
        TARGET_DEVICES += friendlyarm_nanopi-r76s-custom
        EOF
        echo "✅ 分区配置已应用"
    
    - name: Apply Full Configuration
      working-directory: /builder/openwrt
      run: |
        cat > .config << 'EOFCONFIG'
        CONFIG_TARGET_rockchip=y
        CONFIG_TARGET_rockchip_armv8=y
        CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r76s=y
        CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r76s-custom=y
        CONFIG_KERNEL_6_18=y
        CONFIG_KERNEL_CLANG=y
        CONFIG_KERNEL_LTO=y
        CONFIG_DEVEL=y
        CONFIG_CCACHE=y
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_PARTSIZE=2048

        # Docker
        CONFIG_PACKAGE_dockerd=y
        CONFIG_PACKAGE_docker-compose=y
        CONFIG_PACKAGE_kmod-br-netfilter=y
        CONFIG_PACKAGE_kmod-overlay=y
        CONFIG_PACKAGE_kmod-veth=y

        # PassWall
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_passwall=y

        # HomeProxy
        CONFIG_PACKAGE_luci-app-homeproxy=y
        CONFIG_PACKAGE_homeproxy=y

        # DNS Services
        CONFIG_PACKAGE_luci-app-mosdns=y
        CONFIG_PACKAGE_mosdns=y
        CONFIG_PACKAGE_luci-app-smartdns=y
        CONFIG_PACKAGE_smartdns=y
        CONFIG_PACKAGE_luci-app-adguardhome=y
        CONFIG_PACKAGE_adguardhome=y

        # Download
        CONFIG_PACKAGE_luci-app-aria2=y
        CONFIG_PACKAGE_aria2=y
        CONFIG_PACKAGE_qbittorrent=y

        # Network Services
        CONFIG_PACKAGE_luci-app-frpc=y
        CONFIG_PACKAGE_frpc=y
        CONFIG_PACKAGE_luci-app-watchcat=y
        CONFIG_PACKAGE_watchcat=y
        CONFIG_PACKAGE_luci-app-vlmcsd=y
        CONFIG_PACKAGE_vlmcsd=y
        CONFIG_PACKAGE_luci-app-socat=y
        CONFIG_PACKAGE_socat=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_miniupnpd=y
        CONFIG_PACKAGE_luci-app-nlbwmon=y
        CONFIG_PACKAGE_nlbwmon=y
        CONFIG_PACKAGE_luci-app-sqm=y
        CONFIG_PACKAGE_sqm-scripts=y
        CONFIG_PACKAGE_luci-app-wol=y
        CONFIG_PACKAGE_etherwake=y
        CONFIG_PACKAGE_luci-app-appfilter=y
        CONFIG_PACKAGE_appfilter=y
        CONFIG_PACKAGE_luci-app-netspeedtest=y
        CONFIG_PACKAGE_speedtest-cli=y

        # Audio
        CONFIG_PACKAGE_luci-app-airconnect=y
        CONFIG_PACKAGE_airconnect=y
        CONFIG_PACKAGE_luci-app-airplay2=y
        CONFIG_PACKAGE_shairport-sync=y

        # LuCI Theme
        CONFIG_PACKAGE_luci-theme-argon=y
        CONFIG_PACKAGE_luci-app-argon-config=y

        # Tools
        CONFIG_PACKAGE_htop=y
        CONFIG_PACKAGE_btop=y
        CONFIG_PACKAGE_tmux=y
        CONFIG_PACKAGE_vim=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_wget=y
        CONFIG_PACKAGE_git=y
        CONFIG_PACKAGE_bash=y

        # Filesystem
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-vfat=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb3=y

        # Network
        CONFIG_PACKAGE_kmod-tcp-bbr=y
        CONFIG_PACKAGE_kmod-ipt-nat=y
        CONFIG_PACKAGE_kmod-ipt-offload=y
        CONFIG_PACKAGE_kmod-bluetooth=y
        CONFIG_PACKAGE_bluez-libs=y
        CONFIG_PACKAGE_bluez-tools=y
        CONFIG_PACKAGE_firmware-brcmfmac=y
        CONFIG_PACKAGE_kmod-brcmfmac=y
        CONFIG_PACKAGE_kmod-mmc=y
        CONFIG_PACKAGE_kmod-sdio-host=y

        # Crypto
        CONFIG_PACKAGE_kmod-crypto-acompress=y
        CONFIG_PACKAGE_kmod-crypto-aes=y
        CONFIG_PACKAGE_kmod-crypto-sha256=y
        CONFIG_PACKAGE_kmod-crypto-sha512=y

        # Web
        CONFIG_PACKAGE_nginx=y
        CONFIG_PACKAGE_nginx-ssl=y
        EOFCONFIG
        echo "✅ 完整配置已应用"
    
    - name: Apply Pre-configured Settings
      working-directory: /builder/openwrt
      run: |
        # 创建预配置文件目录
        mkdir -p files/etc/config
        mkdir -p files/etc/adguardhome
        mkdir -p files/etc/smartdns
        mkdir -p files/etc/mosdns
        mkdir -p files/etc/rc.d
        
        # ========== 网络配置（PPPoE + LAN 10.0.1.1）==========
        cat > files/etc/config/network << 'EOF'
        config interface 'loopback'
        option device 'lo'
        option proto 'static'
        option ipaddr '127.0.0.1'
        option netmask '255.0.0.0'

        config globals 'globals'
        option ula_prefix 'fdd5:ca47:7261::/48'
        option packet_steering '1'

        config device
        option name 'br-lan'
        option type 'bridge'
        list ports 'eth1'

        config interface 'lan'
        option device 'br-lan'
        option proto 'static'
        option ipaddr '10.0.1.1'
        option netmask '255.255.255.0'
        option ip6assign '64'

        config interface 'wan'
        option device 'eth0'
        option proto 'pppoe'
        option username '15040036024@net'
        option password '12345678'
        option ipv6 'auto'
        option norelease '1'

        config interface 'wan6'
        option device 'eth0'
        option proto 'dhcpv6'

        config interface 'docker'
        option device 'docker0'
        option proto 'none'
        option auto '0'

        config device
        option type 'bridge'
        option name 'docker0'
        EOF
        echo "✅ 网络配置已应用（PPPoE: 15040036024@net / LAN: 10.0.1.1）"
        
        # ========== 防火墙配置（全锥型 NAT）==========
        cat > files/etc/config/firewall << 'EOF'
        config defaults
        option input 'ACCEPT'
        option output 'ACCEPT'
        option forward 'ACCEPT'
        option fullcone '1'
        option brcmfullcone '0'
        option synflood_protect '1'

        config zone
        option name 'lan'
        list network 'lan'
        option input 'ACCEPT'
        option output 'ACCEPT'
        option forward 'ACCEPT'

        config zone
        option name 'wan'
        list network 'wan'
        list network 'wan6'
        option input 'ACCEPT'
        option output 'ACCEPT'
        option forward 'ACCEPT'
        option fullcone4 '1'
        option fullcone6 '1'
        option masq '1'
        option mtu_fix '1'

        config forwarding
        option src 'lan'
        option dest 'wan'

        config rule
        option name 'Allow-DHCP-Renew'
        option src 'wan'
        option proto 'udp'
        option dest_port '68'
        option target 'ACCEPT'
        option family 'ipv4'

        config rule
        option name 'Allow-Ping'
        option src 'wan'
        option proto 'icmp'
        option icmp_type 'echo-request'
        option family 'ipv4'
        option target 'ACCEPT'

        config rule
        option name 'Allow-IGMP'
        option src 'wan'
        option proto 'igmp'
        option family 'ipv4'
        option target 'ACCEPT'

        config rule
        option name 'Allow-DHCPv6'
        option src 'wan'
        option proto 'udp'
        option dest_port '546'
        option family 'ipv6'
        option target 'ACCEPT'

        config rule
        option name 'Allow-MLD'
        option src 'wan'
        option proto 'icmp'
        option src_ip 'fe80::/10'
        list icmp_type '130/0'
        list icmp_type '131/0'
        list icmp_type '132/0'
        list icmp_type '143/0'
        option family 'ipv6'
        option target 'ACCEPT'

        config rule
        option name 'Allow-ICMPv6'
        option src 'wan'
        option proto 'icmp'
        list icmp_type 'echo-request'
        list icmp_type 'echo-reply'
        list icmp_type 'destination-unreachable'
        list icmp_type 'time-exceeded'
        list icmp_type 'bad-header'
        list icmp_type 'unreachable-type'
        option limit '1000/sec'
        option family 'ipv6'
        option target 'ACCEPT'
        EOF
        echo "✅ 防火墙配置已应用（全锥型 NAT）"
        
        # ========== DHCP/DNS 配置 ==========
        cat > files/etc/config/dhcp << 'EOF'
        config dnsmasq
        option domainneeded '1'
        option boguspriv '1'
        option filterwin2k '0'
        option localise_queries '1'
        option rebind_protection '1'
        option rebind_localhost '1'
        option local '/lan/'
        option domain 'lan'
        option expandhosts '1'
        option nonegcache '0'
        option cachesize '10000'
        option authoritative '1'
        option readethers '1'
        option leasefile '/tmp/dhcp.leases'
        option resolvfile '/tmp/resolv.conf.d/resolv.conf.auto'
        option nonwildcard '1'
        option localservice '1'
        option ednspacket_max '1232'

        config dhcp 'lan'
        option interface 'lan'
        option start '100'
        option limit '150'
        option leasetime '12h'
        option dhcpv6 'server'
        option ra 'server'
        option ra_default '1'

        config dhcp 'wan'
        option interface 'wan'
        option ignore '1'

        config odhcpd 'odhcpd'
        option maindhcp '0'
        option leasefile '/tmp/hosts/odhcpd'
        option leasetrigger '/usr/sbin/odhcpd-update'
        option loglevel '4'
        EOF
        echo "✅ DHCP/DNS 配置已应用"
        
        # ========== SmartDNS 配置（完整）==========
        cat > files/etc/config/smartdns << 'EOF'
        config smartdns
        option server_name 'smartdns'
        option bind_device '1'
        option serve_expired '1'
        option resolve_local_hostnames '1'
        option force_https_soa '0'
        option prefetch_domain '1'
        option rr_ttl_min '300'
        option rr_ttl_max '3600'
        option seconddns_port '6335'
        option seconddns_server_group 'world'
        option cache_persist '1'
        option tcp_server '1'
        option dualstack_ip_selection '1'
        option seconddns_tcp_server '1'
        option seconddns_enabled '1'
        option port '5153'
        option cache_size '10240'
        option auto_set_dnsmasq '0'
        option ipv6_server '1'
        option enabled '1'
        option log_level 'error'

        config server
        option type 'udp'
        option ip '211.137.32.178'
        option server_group 'china'
        option name 'CM-DNS-1'
        option enabled '1'

        config server
        option type 'udp'
        option ip '211.140.197.58'
        option server_group 'china'
        option name 'CM-DNS-2'
        option enabled '1'

        config server
        option type 'udp'
        option ip '223.5.5.5'
        option server_group 'china'
        option name 'AliDNS'
        option enabled '1'

        config server
        option type 'udp'
        option ip '119.29.29.29'
        option server_group 'china'
        option name 'DNSPod'
        option enabled '1'

        config server
        option type 'udp'
        option ip '180.76.76.76'
        option server_group 'china'
        option name 'BaiduDNS'
        option enabled '1'

        config server
        option name 'Google-DNS-TCP'
        option ip '8.8.8.8'
        option type 'tcp'
        option server_group 'world'
        option exclude_default_group '1'
        option enabled '1'

        config server
        option type 'udp'
        option name 'Google-DNS-UDP'
        option ip '8.8.8.8'
        option server_group 'world'
        option exclude_default_group '1'
        option enabled '1'

        config server
        option enabled '1'
        option name 'Google-DNS-TLS'
        option ip '8.8.8.8'
        option type 'tls'
        option server_group 'world'

        config server
        option type 'udp'
        option server_group 'world'
        option name 'DNS-Pi'
        option ip '101.226.4.6'
        option enabled '1'

        config server
        option type 'udp'
        option server_group 'world'
        option name 'OpenDNS'
        option ip '208.67.222.222'
        option enabled '1'
        EOF
        echo "✅ SmartDNS 配置已应用（10 个上游 DNS）"
        
        # ========== MosDNS 配置 ==========
        cat > files/etc/config/mosdns << 'EOF'
        config mosdns 'config'
        option enabled '1'
        option listen_port '5335'
        option geo_auto_update '1'
        option geo_update_week_time '*'
        option geo_update_day_time '2'
        option configfile '/var/etc/mosdns.json'
        option log_level 'info'
        option cache '1'
        option concurrent '2'
        option idle_timeout '30'
        option cache_size '8000'
        option lazy_cache_ttl '86400'
        option bootstrap_dns '119.29.29.29'
        list remote_dns 'tls://8.8.8.8'
        option redirect '1'
        option prefer_ipv4 '1'
        EOF
        echo "✅ MosDNS 配置已应用"
        
        # ========== AdGuard Home 配置 ==========
        cat > files/etc/config/AdGuardHome << 'EOF'
        config adguardhome config
        option config '/etc/adguardhome.yaml'
        option workdir '/var/lib/adguardhome'
        option pidfile '/run/adguardhome.pid'
        option enabled '1'
        EOF
        echo "✅ AdGuard Home 配置已应用"
        
        # ========== Docker 配置 ==========
        cat > files/etc/config/dockerd << 'EOF'
        config globals
        option enabled '1'
        option storage 'overlay2'
        option data_root '/opt/docker'
        option log_level 'warn'
        EOF
        echo "✅ Docker 配置已应用（存储：/opt/docker）"
        
        # ========== fstab 分区配置 ==========
        cat > files/etc/config/fstab << 'EOF'
        config global
        option anon_swap '0'
        option anon_mount '0'
        option auto_swap '0'
        option auto_mount '0'
        option delay_root '5'
        option check_fs '0'

        config mount
        option target '/overlay'
        option uuid 'OVERLAY_UUID'
        option enabled '1'
        option fstype 'ext4'
        option options 'rw,noatime'

        config mount
        option target '/opt/docker'
        option uuid 'DOCKER_UUID'
        option enabled '1'
        option fstype 'ext4'
        option options 'rw,noatime'
        EOF
        echo "✅ fstab 配置已应用（overlay 8GB + docker 52GB）"
        
        # ========== 系统配置（时区）==========
        cat > files/etc/config/system << 'EOF'
        config system
        option timezone 'CST-8'
        option timezone_file '/usr/share/zoneinfo/Asia/Shanghai'
        option log_size '64'
        option urandom_seed '1'

        config timeserver 'ntp'
        list server '0.pool.ntp.org'
        list server '1.pool.ntp.org'
        list server '2.pool.ntp.org'
        list server '3.pool.ntp.org'
        option enabled '1'
        option enable_server '0'
        EOF
        echo "✅ 系统配置已应用（时区：Asia/Shanghai）"
        
        # ========== 启用所有服务 ==========
        for svc in dockerd adguardhome smartdns mosdns passwall homeproxy aria2 frpc watchcat vlmcsd socat upnp nlbwmon sqm appfilter airconnect airplay2; do
            ln -sf /etc/init.d/$svc files/etc/rc.d/S99$svc 2>/dev/null || true
        done
        echo "✅ 所有服务已启用（开机自启）"
        
        # ========== 复制 SmartDNS 自定义规则 ==========
        mkdir -p files/etc/smartdns
        if [ -f /builder/files/etc/smartdns/custom.conf ]; then
            cp /builder/files/etc/smartdns/custom.conf files/etc/smartdns/ 2>/dev/null || true
        fi
    
    - name: Compile OpenWrt
      working-directory: /builder/openwrt
      env:
        KERNEL_CLANG_LTO: y
        BUILD_FAST: y
        ENABLE_CCACHE: y
        ENABLE_OTA: y
        ENABLE_BPF: y
        ENABLE_LTO: y
        ENABLE_LRNG: y
        USE_GCC15: y
        ENABLE_MOLD: y
      run: |
        echo "生成配置..."
        make defconfig
        echo "开始编译（约 90-120 分钟）..."
        echo "开始时间：$(date)"
        make -j$(nproc)
        echo "结束时间：$(date)"
    
    - name: Prepare Firmware
      working-directory: /builder/openwrt
      run: |
        mkdir -p /builder/output
        cp bin/targets/rockchip/armv8/*nanopi-r76s*.img.gz /builder/output/ 2>/dev/null || true
        cp bin/targets/rockchip/armv8/*.manifest /builder/output/ 2>/dev/null || true
        cp bin/targets/rockchip/armv8/config.buildinfo /builder/output/ 2>/dev/null || true
        echo "固件文件："
        ls -lh /builder/output/
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: OpenWrt-NanoPi-R76S-Custom-Full
        path: /builder/output/*.img.gz
        retention-days: 7
    
    - name: Create Release
      if: success()
      uses: ncipollo/release-action@main
      with:
        name: OpenWrt-25.12.2-NanoPi-R76S-Custom-Full
        tag: custom-full-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: /builder/output/*.img.gz
        allowUpdates: true
        replacesArtifacts: true
        body: |
          ## NanoPi R76S OpenWrt 25.12.2 完全定制固件
          
          ### ✅ 已预配置（开箱即用）
          - **PPPoE 账号**：15040036024@net / 12345678
          - **LAN IP**：10.0.1.1
          - **时区**：Asia/Shanghai
          - **Docker 存储**：/opt/docker
          - **防火墙**：全锥型 NAT
          
          ### 📦 内置软件包
          | 类别 | 软件包 |
          |------|--------|
          | **代理** | PassWall, HomeProxy |
          | **DNS** | MosDNS (5335), SmartDNS (5153), AdGuard Home |
          | **下载** | Aria2, qBittorrent |
          | **网络** | FRP, Watchcat, Socat, UPnP, 应用过滤 |
          | **监控** | 宽带监控，网速测试 |
          | **服务** | Docker, KMS 服务器 |
          | **音频** | AirConnect, AirPlay2 |
          | **其他** | 网络唤醒，SQM 队列管理 |
          
          ### 💾 分区配置（64GB eMMC）
          | 分区 | 容量 | 用途 |
          |------|------|------|
          | boot | 64MB | 引导 |
          | kernel | 64MB | 内核 |
          | rootfs | 2GB | 系统 |
          | overlay | **8GB** | 用户数据 |
          | docker | **~52GB** | /opt/docker |
          
          ### 🔧 使用说明
          1. 解压 .img.gz 文件
          2. 刷入 microSD 卡
          3. 插入 NanoPi R76S 启动
          4. 访问 http://10.0.1.1（**无需配置，开箱即用**）
          
          ### 📝 注意
          - PassWall 节点需手动添加
          - 恢复出厂设置后配置保留
          - Docker 数据存储在 /opt/docker（52GB）
